---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
# Shared module pipeline for all Plasma Machine channels (stable + testing).
# Included by recipes/recipe.yml and recipes/recipe-testing.yml via `from-file`.
# Multi-module includes wrap their entries under a top-level `modules:` key. Order matters.
modules:
  # 1. The theme uses the Plymouth "script" renderer, whose plugin
  #    (/usr/lib64/plymouth/script.so) is not in the Bazzite base image. Layer it.
  - type: dnf
    install:
      packages:
        - plymouth-plugin-script

  # 2. Copy everything under files/system/* into the image root (/).
  #    This places the theme at /usr/share/plymouth/themes/plasma-machine/.
  - type: files
    files:
      - source: system
        destination: /

  # 3. Make it the default Plymouth theme.
  - type: script
    snippets:
      - "plymouth-set-default-theme plasma-machine"

  # 4. Regenerate the initramfs so the theme is present at early boot.
  #    (This is the step that cannot persist when done at runtime on an atomic system.)
  - type: initramfs

  # 5. HDMI-CEC TV automation. The follower/tv-on/tv-standby/suspend units and
  #    their /usr/libexec/plasma-machine scripts are copied by the files module
  #    above. v4l-utils (cec-ctl, cec-follower) already ships in the bazzite-deck
  #    base, so it is deliberately NOT layered here — re-layering a base package
  #    can error under rpm-ostree. If a future base ever drops it, uncomment:
  #  - type: dnf
  #    install:
  #      packages:
  #        - v4l-utils
  #
  #    Enable all four CEC services by default. cec-suspend-on-tv-off was
  #    validated on-device (it detects the TV's <Standby> and suspends the PC,
  #    and coexists with cec-follower on the same /dev/cec device), so it is
  #    enabled out of the box rather than left opt-in.
  - type: systemd
    system:
      enabled:
        - cec-follower.service
        - cec-tv-on.service
        - cec-tv-standby.service
        - cec-suspend-on-tv-off.service

  # 6. Install the cosign signing policy so signed pulls verify against cosign.pub.
  - type: signing
