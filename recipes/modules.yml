---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
# Shared module pipeline for all Plasma Machine channels (stable + testing).
# Included by recipes/recipe.yml and recipes/recipe-testing.yml via `from-file`.
# Multi-module includes wrap their entries under a top-level `modules:` key. Order matters.
modules:
  # 1. The theme uses the Plymouth "script" renderer, whose plugin
  #    (/usr/lib64/plymouth/script.so) is not in the Bazzite base image. Layer it.
  - type: dnf
    install:
      packages:
        - plymouth-plugin-script

  # 2. Copy everything under files/system/* into the image root (/).
  #    This places the theme at /usr/share/plymouth/themes/plasma-machine/.
  - type: files
    files:
      - source: system
        destination: /

  # 3. Make it the default Plymouth theme.
  - type: script
    snippets:
      - "plymouth-set-default-theme plasma-machine"

  # 4. Regenerate the initramfs so the theme is present at early boot.
  #    (This is the step that cannot persist when done at runtime on an atomic system.)
  - type: initramfs

  # 5. HDMI-CEC TV automation.
  #    Outbound PC->TV control (wake + set active source on boot, standby on
  #    poweroff) is already provided by the bazzite-deck base via
  #    /usr/bin/cec-control and its cec-onboot/cec-onpoweroff/cec-onsleep one-shot
  #    units, configured by /etc/default/cec-control (CEC_MODE=dgpu on this
  #    machine; that file is owned by the base/host and left untouched here). So we
  #    enable the base's boot/poweroff units and add only what the base lacks: a
  #    persistent poll responder (cec-follower) and inbound TV-off -> suspend
  #    (cec-suspend-on-tv-off). Both custom units + their
  #    /usr/libexec/plasma-machine scripts are copied by the files module above.
  #    v4l-utils (cec-ctl, cec-follower) already ships in the base, so it is
  #    deliberately NOT layered here — re-layering a base package can error under
  #    rpm-ostree. If a future base ever drops it, uncomment:
  #  - type: dnf
  #    install:
  #      packages:
  #        - v4l-utils
  - type: systemd
    system:
      enabled:
        # base units (outbound CEC via cec-control), disabled upstream by default:
        - cec-onboot.service
        - cec-onpoweroff.service
        # ours (no base equivalent):
        - cec-follower.service
        - cec-suspend-on-tv-off.service
      disabled:
        # base sleep unit: /etc/default/cec-control sets CEC_ONSLEEP_STANDBY=false.
        - cec-onsleep.service
      masked:
        # libcec example units: they hardcode cec-client (wrong backend for our
        # kernel-CEC adapter) and would race cec-control if ever enabled.
        - cec-poweroff-tv.service
        - cec-active-source.service
        - cec-active-source.timer

  # 6. Install the cosign signing policy so signed pulls verify against cosign.pub.
  - type: signing
